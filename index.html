<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game store</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <nav class="navbar">
        <a class="color-btn" href="games.html">Games</a>
        <a class="color-btn" href="about.html">About</a>
        <a class="color-btn" href="contact.html">Contact</a>
      </nav>
    </header>
    <div class="container">
      <img class="logo" src="pictures/controle.webp" alt="logo" />
      <div class="hero-copy">
        <h1>Find your next game</h1>
        <p>
          Explore curated categories and discover iconic titles across action,
          adventure and strategy.
        </p>
      </div>
    </div>
    <!--slide show-->
    <div class="slidershow middle">
      <div class="slides">
        <input type="radio" name="r" id="r1" checked />

        <input type="radio" name="r" id="r2" />

        <input type="radio" name="r" id="r3" />

        <input type="radio" name="r" id="r4" />
        <input type="radio" name="r" id="r5" />

        <div class="slide s1">
          <img
            class="slide-image"
            src="pictures/3098481c9164bb5f33069b37e49fba1a572ea3b89971ee7b.avif"
            alt=""
          />
        </div>
        <div class="slide">
          <img src="pictures/callofduty-modern.jpg" alt="" />
        </div>
        <div class="slide">
          <img src="pictures/l8QTN7ThQK3lRBHhB3nX1s7h.webp" alt="" />
        </div>
        <div class="slide">
          <img src="pictures/Spider-Man-2.png" alt="" />
        </div>
        <div class="slide">
          <img
            src="pictures/315718bce7eed62e3cf3fb02d61b81ff1782d6b6cf850fa4.avif"
            alt=""
          />
        </div>
      </div>
      <div class="navigation">
        <label for="r1" class="bar"></label>
        <label for="r2" class="bar"></label>
        <label for="r3" class="bar"></label>
        <label for="r4" class="bar"></label>
        <label for="r5" class="bar"></label>
      </div>
    </div>
  </body>
</html>
