<!doctype html>

  <body>
    <header class="header">

    <div class="wallpaper">
      <form
        class="form-box"
        action="https://formsubmit.co/therese8949@gmail.com"
        method="POST"
      >

          id="email-box"
          type="email"
          name="email"
          placeholder="Email address"
          required
        />
        <input type="hidden" name="_next" value="thankyoupage.html" />

          id="write-message"
          name="message"
          placeholder="Write your message here"
          required

    </div>
